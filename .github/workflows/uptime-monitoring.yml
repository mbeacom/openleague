name: Uptime Monitoring

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      target_urls:
        description: 'Optional comma-separated URLs or name=url pairs to check'
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: uptime-monitoring
  cancel-in-progress: true

jobs:
  uptime:
    name: Check production uptime
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      # Prisma client generation runs during bun install. A real secret is used
      # when available; the fallback only satisfies generate-time URL parsing.
      DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://postgres:postgres@localhost:5432/openleague_ci' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2.0.2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run uptime checks
        env:
          UPTIME_CHECK_URLS: ${{ inputs.target_urls || 'main=https://openl.app,docs=https://openleague.dev,health=https://openl.app/api/health' }}
          UPTIME_CHECK_AUTH_TARGETS: health
          UPTIME_CHECK_AUTH_ALLOWED_HOSTS: openl.app,openhockey.app
          UPTIME_CHECK_TOKEN: ${{ secrets.UPTIME_CHECK_TOKEN }}
          UPTIME_CHECK_TIMEOUT_MS: '10000'
        run: bun run uptime:check