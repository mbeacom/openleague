<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline - OpenLeague</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f8fafb;
        color: #10233f;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(100%, 520px);
        border: 1px solid rgba(13, 71, 161, 0.12);
        border-radius: 24px;
        background: #fff;
        box-shadow: 0 24px 80px rgba(13, 71, 161, 0.14);
        padding: 40px;
        text-align: center;
      }

      img {
        width: 72px;
        height: 72px;
        margin-bottom: 20px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 7vw, 3rem);
        line-height: 1.05;
      }

      p {
        margin: 0;
        color: #4f6078;
        font-size: 1.05rem;
        line-height: 1.6;
      }

      a {
        display: inline-flex;
        margin-top: 28px;
        min-height: 44px;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
        background: #1976d2;
        color: #fff;
        padding: 0 22px;
        font-weight: 700;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/images/logo.webp" alt="OpenLeague logo" />
      <h1>You are offline</h1>
      <p>
        OpenLeague saved a lightweight fallback page, but this route needs a fresh connection.
        Reconnect and reload to get back to the season plan.
      </p>
      <a href="/">Try the homepage</a>
    </main>
  </body>
</html>
